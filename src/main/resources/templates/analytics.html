<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Analytics - Price History</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        /* TOP BAR */
        .top-bar {
            background: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            color: #1f2937;
        }

        .back-link {
            text-decoration: none;
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link:hover {
            color: #000;
        }

        /* CONTENT */
        .container {
            padding: 30px;
        }

        h2 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #333;
            color: white;
        }

    </style>
</head>

<body>

<!-- TOP HEADER -->
<div class="top-bar">
    <div class="brand">Dream Ora</div>
    <a th:href="@{/admin}" class="back-link">← Back to Dashboard</a>
</div>

<!-- CONTENT -->
<div class="container">

    <h2>Price Change Analytics</h2>

    <table>
        <thead>
        <tr>
            <th>Item ID</th>
            <th>Old Price</th>
            <th>New Price</th>
            <th>Old Large Price</th>
            <th>New Large Price</th>
            <th>Changed At</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="h : ${historyList}">
            <td th:text="${h.menuItemId}"></td>
            <td th:text="${h.oldPrice}"></td>
            <td th:text="${h.newPrice}"></td>
            <td th:text="${h.oldLargePrice}"></td>
            <td th:text="${h.newLargePrice}"></td>
            <td th:text="${h.changedAt}"></td>
        </tr>

        <tr th:if="${#lists.isEmpty(historyList)}">
            <td colspan="6">No price history found.</td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
